<div class="min-h-screen flex items-center justify-center bg-slate-950 px-6 py-12">

  <div class="w-full max-w-md">

    <!-- Title -->
    <div class="text-center mb-8">
      <h2 class="text-3xl font-bold text-white tracking-tight">
        Sign in to your account
      </h2>
      <p class="mt-2 text-sm text-slate-400">
        Welcome back. Please enter your details.
      </p>
    </div>

    <!-- Card -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl shadow-2xl p-8">

      <form (ngSubmit)="login()" class="space-y-6">

        <!-- Username -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">
            Username
          </label>

          <input
            type="text"
            [(ngModel)]="loginData.username"
            name="username"
            required
            class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            placeholder="Enter username"
          />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">
            Password
          </label>

          <input
            type="password"
            [(ngModel)]="loginData.password"
            name="password"
            required
            class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            placeholder="••••••••"
          />
        </div>

        <!-- Role -->
        <div>
          <label class="block text-sm font-medium text-slate-300 mb-2">
            Role
          </label>

          <select
            [(ngModel)]="loginData.role"
            name="role"
            required
            class="w-full rounded-lg bg-slate-800 border border-slate-700 text-white px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          >
            <option value="">Select Role</option>
            <option value="ADMIN">ADMIN</option>
            <option value="TEACHER">TEACHER</option>
            <option value="STUDENT">STUDENT</option>
          </select>

        </div>

        <!-- Button -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-lg"
        >
          Sign in
        </button>

      </form>

      <!-- Register link -->
      <div class="mt-6 text-center text-sm text-slate-400">
        Don't have an account?
        <a routerLink="/register" class="text-indigo-400 hover:text-indigo-300 font-medium">
          Sign up
        </a>
      </div>

    </div>
  </div>
</div>
