<div class="p-10 bg-gray-100 min-h-screen">

<h1 class="text-3xl font-bold mb-8">
Admin Dashboard
</h1>

<div class="grid grid-cols-2 gap-8 mb-10">

<!-- Register Student -->

<div class="bg-white shadow rounded-xl p-6">

<h2 class="text-xl font-semibold mb-4">
Register Student
</h2>

<form class="space-y-4">

<input
type="text"
placeholder="Student Username"
class="w-full border p-2 rounded"
/>

<input
type="password"
placeholder="Password"
class="w-full border p-2 rounded"
/>

<input
type="email"
placeholder="Email"
class="w-full border p-2 rounded"
/>

<button
class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">

Register Student

</button>

</form>

</div>


<!-- Register Teacher -->

<div id="teacher-registration" class="bg-white shadow rounded-xl p-6">

<h2 class="text-xl font-semibold mb-4">
Register Teacher
</h2>

<form class="space-y-4">

<input
type="text"
placeholder="Teacher Username"
class="w-full border p-2 rounded"
/>

<input
type="password"
placeholder="Password"
class="w-full border p-2 rounded"
/>

<input
type="email"
placeholder="Email"
class="w-full border p-2 rounded"
/>

<button
class="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600">

Register Teacher

</button>

</form>

</div>

</div>

<div class="grid grid-cols-2 gap-8 mb-10">

<!-- Create Subject -->

<div class="bg-white shadow rounded-xl p-6">

<h2 class="text-xl font-semibold mb-4">
Create Subject
</h2>

<form class="space-y-4">

<input
type="text"
placeholder="Subject Name"
class="w-full border p-2 rounded"
/>

<input
type="text"
placeholder="Subject Code"
class="w-full border p-2 rounded"
/>

<button
class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">

Create Subject

</button>

</form>

<!-- Backend placeholder -->
<!-- POST /admin/create-subject
{
  name: "...",
  code: "..."
}
-->

</div>



<!-- Assign Teacher to Subject -->

<div class="bg-white shadow rounded-xl p-6">

<h2 class="text-xl font-semibold mb-4">
Assign Teacher to Subject
</h2>

<form class="space-y-4">

<select class="w-full border p-2 rounded">

<option>Select Subject</option>
<option>Mathematics</option>
<option>Physics</option>
<option>Computer Science</option>

</select>

<select class="w-full border p-2 rounded">

<option>Select Teacher</option>
<option *ngFor="let user of users" 
        [hidden]="user.role !== 'TEACHER'">

{{user.username}}

</option>

</select>

<button
class="bg-indigo-500 text-white px-4 py-2 rounded hover:bg-indigo-600">

Assign Teacher

</button>

</form>

<div class="mt-4 text-sm text-gray-500">

No teachers registered?

<button
class="text-blue-600 underline"
onclick="document.getElementById('teacher-registration').scrollIntoView({behavior:'smooth'})">

Register a Teacher

</button>

</div>

<!-- Backend placeholder -->
<!-- POST /admin/assign-subject
{
  subjectId: "...",
  teacherId: "..."
}
-->

</div>

</div>

<div class="bg-white shadow rounded-xl p-6">

<div class="flex justify-between mb-4">

<input
type="text"
placeholder="Search users..."
[(ngModel)]="searchText"
class="border px-3 py-2 rounded w-1/3"
/>

<select
[(ngModel)]="filterType"
class="border px-3 py-2 rounded">

<option value="newest">Newest</option>
<option value="oldest">Oldest</option>
<option value="2months">Last 2 Months</option>

</select>

</div>


<table class="w-full border">

<thead class="bg-gray-200">

<tr>
<th class="p-3 text-left">ID</th>
<th class="p-3 text-left">Username</th>
<th class="p-3 text-left">Role</th>
<th class="p-3 text-left">Created</th>
</tr>

</thead>

<tbody>

<tr
*ngFor="let user of filteredUsers"
class="border-t hover:bg-gray-50">

<td class="p-3">{{user.id}}</td>
<td class="p-3">{{user.username}}</td>

<td class="p-3">

<span
class="px-2 py-1 rounded text-white"
[ngClass]="{
'bg-blue-500': user.role === 'STUDENT',
'bg-purple-500': user.role === 'TEACHER'
}">
{{user.role}}
</span>

</td>

<td class="p-3">
{{user.createdAt | date:'mediumDate'}}
</td>

</tr>

</tbody>

</table>

</div>

</div>
