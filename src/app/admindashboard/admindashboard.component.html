<div class="p-10 bg-gray-100 min-h-screen">

<h1 class="text-3xl font-bold mb-8">
Admin Dashboard
</h1>

<div class="grid grid-cols-2 gap-8 mb-10">

<!-- Register Student -->

<div class="bg-white shadow rounded-xl p-6">

<h2 class="text-xl font-semibold mb-4">
Register Student
</h2>

<form (ngSubmit)="registerStudent()" class="space-y-4">

<input
type="text"
placeholder="Student Username"
[(ngModel)]="student.username"
name="studentUsername"
class="w-full border p-2 rounded"
/>

<input
type="password"
placeholder="Password"
[(ngModel)]="student.password"
name="studentPassword"
class="w-full border p-2 rounded"
/>

<!-- <input
type="email"
placeholder="Email"
[(ngModel)]="student.email"
name="studentEmail"
class="w-full border p-2 rounded"
/> -->

<button
type="submit"
class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">

Register Student

</button>

</form>

</div>


<!-- Register Teacher -->

<div id="teacher-registration" class="bg-white shadow rounded-xl p-6">

<h2 class="text-xl font-semibold mb-4">
Register Teacher
</h2>

<form (ngSubmit)="registerTeacher()" class="space-y-4">

<input
type="text"
placeholder="Teacher Username"
[(ngModel)]="teacher.username"
name="teacherUsername"
class="w-full border p-2 rounded"
/>

<input
type="password"
placeholder="Password"
[(ngModel)]="teacher.password"
name="teacherPassword"
class="w-full border p-2 rounded"
/>

<!-- <input
type="email"
placeholder="Email"
[(ngModel)]="teacher.email"
name="teacherEmail"
class="w-full border p-2 rounded"
/> -->

<button
type="submit"
class="bg-purple-500 text-white px-4 py-2 rounded hover:bg-purple-600">

Register Teacher

</button>

</form>

</div>

</div>

<div class="grid grid-cols-2 gap-8 mb-10">

<!-- Create Subject -->

<div class="bg-white shadow rounded-xl p-6">

<h2 class="text-xl font-semibold mb-4">
Create Subject
</h2>

<form (ngSubmit)="createSubject()" class="space-y-4">

<input
type="text"
placeholder="Subject Name"
[(ngModel)]="subject.name"
name="subjectName"
class="w-full border p-2 rounded"
/>

<!-- <input
type="text"
placeholder="Subject Code"
[(ngModel)]="subject.code"
name="subjectCode"
class="w-full border p-2 rounded"
/> -->

<button
type="submit"
class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">

Create Subject

</button>

</form>

</div>



<!-- Assign Teacher to Subject -->

<div class="bg-white shadow rounded-xl p-6">

<h2 class="text-xl font-semibold mb-4">
Assign Teacher to Subject
</h2>

<form (ngSubmit)="assignTeacher()" class="space-y-4">

<select
[(ngModel)]="assign.subjectId"
name="subjectId"
class="w-full border p-2 rounded">

<option value="">Select Subject</option>

<option *ngFor="let subject of subjects" [value]="subject.id">
{{subject.name}}
</option>

</select>

<select
[(ngModel)]="assign.teacherId"
name="teacherId"
class="w-full border p-2 rounded">

<option value="">Select Teacher</option>

<option *ngFor="let teacher of teachers" [value]="teacher.id">
{{teacher.username}}
</option>

</select>

<button
type="submit"
class="bg-indigo-500 text-white px-4 py-2 rounded hover:bg-indigo-600">

Assign Teacher

</button>

</form>

</div>

</div>

<div class="bg-white shadow rounded-xl p-6">

<div class="flex justify-between mb-4">

<input
type="text"
placeholder="Search users..."
[(ngModel)]="searchText"
(keyup)="searchUsers()"
class="border px-3 py-2 rounded w-1/3"
/>

<select
[(ngModel)]="filterType"
(change)="applyFilter()"
class="border px-3 py-2 rounded">

<option value="newest">Newest</option>
<option value="oldest">Oldest</option>
<option value="2months">Last 2 Months</option>

</select>

</div>


<table class="w-full border">

<thead class="bg-gray-200">

<tr>
<th class="p-3 text-left">ID</th>
<th class="p-3 text-left">Username</th>
<th class="p-3 text-left">Role</th>
<th class="p-3 text-left">Created</th>
</tr>

</thead>

<tbody>

<tr
*ngFor="let user of filteredUsers"
class="border-t hover:bg-gray-50">

<td class="p-3">{{user.id}}</td>
<td class="p-3">{{user.username}}</td>

<td class="p-3">

<span
class="px-2 py-1 rounded text-white"
[ngClass]="{
'bg-blue-500': user.role === 'STUDENT',
'bg-purple-500': user.role === 'TEACHER'
}">
{{user.role}}
</span>

</td>

<td class="p-3">
{{user.createdAt | date:'mediumDate'}}
</td>

</tr>

</tbody>

</table>

</div>

</div>
