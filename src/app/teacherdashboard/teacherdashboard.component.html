<div class="p-10 bg-gray-100 min-h-screen">

<h1 class="text-3xl font-bold mb-8">
Teacher Dashboard
</h1>


<div class="bg-white shadow rounded-xl p-6 mb-10">

<h2 class="text-xl font-semibold mb-4">
Mark Attendance
</h2>

<form class="grid grid-cols-2 gap-4">

<select class="border p-2 rounded">
<option>Select Subject</option>
<option>Mathematics</option>
<option>Physics</option>
<option>Computer Science</option>
</select>

<select class="border p-2 rounded">
<option>Select Student</option>
<option>Rahul</option>
<option>Sneha</option>
<option>Aman</option>
</select>

<select class="border p-2 rounded">
<option>Status</option>
<option value="PRESENT">Present</option>
<option value="ABSENT">Absent</option>
</select>

<button
class="col-span-2 bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">

Mark Attendance

</button>

</form>

<!-- Backend placeholder -->

<!--
POST /teacher/mark-attendance

{
  student: { id: 1 },
  subject: { id: 2 },
  status: "PRESENT"
}
-->

</div>

<div class="bg-white shadow rounded-xl p-6 mb-10">

<h2 class="text-xl font-semibold mb-4">
Upload Study Notes
</h2>

<form class="space-y-4">

<input
type="text"
placeholder="Notes Title"
class="w-full border p-2 rounded"
/>

<select class="w-full border p-2 rounded">

<option>Select Subject</option>
<option>Mathematics</option>
<option>Physics</option>
<option>Computer Science</option>

</select>

<input
type="file"
class="w-full border p-2 rounded"
/>

<button
class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">

Upload Notes

</button>

</form>

<!-- Backend placeholder -->

<!--
POST /teacher/upload-notes

FormData:
file: File
subjectId: 1
title: "Lecture 1 Notes"
-->

</div>

<div class="bg-white shadow rounded-xl p-6">

<h2 class="text-xl font-semibold mb-4">
Uploaded Notes
</h2>

<table class="w-full border">

<thead class="bg-gray-200">

<tr>
<th class="p-3 text-left">ID</th>
<th class="p-3 text-left">Title</th>
<th class="p-3 text-left">Subject</th>
<th class="p-3 text-left">Upload Date</th>
<th class="p-3 text-left">File</th>
</tr>

</thead>

<tbody>

<tr
*ngFor="let note of notes"
class="border-t hover:bg-gray-50">

<td class="p-3">{{note.id}}</td>
<td class="p-3">{{note.title}}</td>
<td class="p-3">{{note.subject}}</td>
<td class="p-3">{{note.date}}</td>

<td class="p-3">

<button
class="text-blue-600 underline">

Download

</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>
