<nav class="navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
  <div class="container px-5">

    <a class="navbar-brand fw-bold" routerLink="/">Student Management</a>

    <!-- Angular controlled toggle -->
    <button
      class="navbar-toggler"
      type="button"
      (click)="toggleMenu()"
      aria-controls="navbarResponsive"
      [attr.aria-expanded]="isMenuOpen"
      aria-label="Toggle navigation"
    >
      Menu
      <i class="bi-list"></i>
    </button>

    <!-- Remove Bootstrap collapse JS dependency -->
    <div
      id="navbarResponsive"
      class="navbar-collapse"
      [ngClass]="{ 'collapse': !isMenuOpen }"
    >
      <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">

        <li class="nav-item">
          <a class="btn btn-outline-primary me-2" routerLink="/login" (click)="isMenuOpen = false">
            Login
          </a>
        </li>

        <li class="nav-item">
          <a class="btn btn-primary rounded-pill px-4" routerLink="/register" (click)="isMenuOpen = false">
            Register
          </a>
        </li>

      </ul>

    </div>

  </div>
</nav>
